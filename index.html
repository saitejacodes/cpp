<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>C++ Practice Tracker — Neso Academy</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#222230;
  --accent:#00ff88;--accent2:#00cc6a;--purple:#7c3aed;
  --text:#f0f0f8;--text2:#9090b0;--text3:#5a5a7a;
  --border:#2a2a3a;--border2:#3a3a4a;
  --red:#ff4466;--amber:#ffaa00;--blue:#4488ff;--cyan:#00ccff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(124,58,237,0.07) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(0,255,136,0.04) 0%,transparent 55%);pointer-events:none;z-index:0;}
.wrap{max-width:880px;margin:0 auto;padding:2rem 1.5rem 5rem;position:relative;z-index:1;}

/* HEADER */
header{margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--border);}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.logo-box{width:38px;height:38px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:#000;flex-shrink:0;}
h1{font-size:24px;font-weight:800;letter-spacing:-0.5px;}
h1 span{color:var(--accent);}
.subtitle{font-size:13px;color:var(--text2);margin-top:3px;}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:1.5rem;}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 16px;}
.stat-n{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent);}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.prog-wrap{margin-top:1.5rem;}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:7px;}
.prog-track{height:5px;background:var(--bg4);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%;}

/* SECTION */
.section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;}
.section:hover{border-color:var(--border2);}
.section.open{border-color:rgba(124,58,237,.4);}
.sec-hdr{display:flex;align-items:center;gap:11px;padding:13px 17px;cursor:pointer;user-select:none;transition:background .15s;}
.sec-hdr:hover{background:var(--bg3);}
.sec-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sec-ttl{font-size:14px;font-weight:600;color:var(--text);flex:1;}
.sec-badge{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);background:var(--bg4);border:1px solid var(--border);border-radius:99px;padding:2px 8px;}
.sec-badge.done{color:var(--accent);border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.06);}
.chev{font-size:11px;color:var(--text3);transition:transform .22s;}
.section.open .chev{transform:rotate(180deg);}
.sec-body{display:none;border-top:1px solid var(--border);}
.section.open .sec-body{display:block;}

/* LECTURE ROW */
.lec-row{display:flex;align-items:center;gap:9px;padding:10px 17px;border-bottom:1px solid var(--border);transition:background .12s;}
.lec-row:last-child{border-bottom:none;}
.lec-row:hover{background:var(--bg3);}
.lec-row.done-row{opacity:.45;}
.lec-row.done-row .lec-name{text-decoration:line-through;}
.lec-n{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);min-width:26px;}
.lec-name{font-size:13px;color:var(--text);flex:1;line-height:1.4;}
.btn-prac{font-size:11px;font-family:'Syne',sans-serif;font-weight:600;padding:4px 10px;border-radius:6px;background:transparent;border:1px solid var(--border2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn-prac:hover{background:rgba(124,58,237,.15);border-color:var(--purple);color:var(--accent);}
.lec-chk{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s;}
.lec-chk:hover{border-color:var(--accent);}
.lec-chk.on{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(7px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
.overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;max-width:720px;width:100%;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);margin:auto;}
@keyframes popIn{from{transform:scale(.92) translateY(16px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.m-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.m-topic{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);font-weight:600;margin-bottom:3px;font-family:'JetBrains Mono',monospace;}
.m-title{font-size:15px;font-weight:700;color:var(--text);}
.m-close{background:var(--bg4);border:1px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.m-close:hover{background:var(--red);color:#fff;border-color:var(--red);}
.m-body{padding:18px 20px;}

/* QUESTION CARD */
.q-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.q-top{padding:14px 16px 10px;}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.q-num{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--purple);font-weight:600;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);border-radius:99px;padding:2px 8px;}
.q-diff{font-size:10px;font-family:'JetBrains Mono',monospace;border-radius:99px;padding:2px 8px;}
.diff-easy{color:var(--accent);background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);}
.diff-med{color:var(--amber);background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.2);}
.diff-hard{color:var(--red);background:rgba(255,68,102,.08);border:1px solid rgba(255,68,102,.2);}
.q-problem{font-size:13px;color:var(--text);line-height:1.65;font-weight:500;margin-bottom:8px;}
.q-example{font-size:12px;color:var(--text2);background:var(--bg4);border-left:2px solid var(--purple);border-radius:0 6px 6px 0;padding:7px 10px;margin-bottom:8px;font-family:'JetBrains Mono',monospace;line-height:1.6;}
.q-hint-toggle{font-size:11px;color:var(--text3);cursor:pointer;border:none;background:none;padding:0;font-family:'Syne',sans-serif;transition:color .15s;}
.q-hint-toggle:hover{color:var(--text2);}
.q-hint{font-size:12px;color:var(--text2);padding:8px 10px;border-top:1px dashed var(--border2);margin-top:6px;line-height:1.6;display:none;}
.q-hint.show{display:block;}
.q-hint b{color:var(--amber);}
.q-code-wrap{border-top:1px solid var(--border);}
.q-code-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);padding:7px 14px 0;text-transform:uppercase;letter-spacing:.8px;}
.q-code{font-size:12px;font-family:'JetBrains Mono',monospace;color:#c8d0e7;background:var(--bg);padding:10px 14px 12px;line-height:1.7;white-space:pre;overflow-x:auto;}
.q-code .kw{color:#c792ea;}
.q-code .fn{color:#82aaff;}
.q-code .str{color:#c3e88d;}
.q-code .cmt{color:#546e7a;font-style:italic;}
.q-code .num{color:#f78c6c;}
.q-actions{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--border);}
.btn-run{font-size:11px;font-family:'Syne',sans-serif;font-weight:700;padding:5px 13px;border-radius:7px;background:var(--accent);color:#000;border:none;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.btn-run:hover{background:#00ffaa;transform:translateY(-1px);}
.btn-copy{font-size:11px;font-family:'Syne',sans-serif;font-weight:600;padding:5px 11px;border-radius:7px;background:transparent;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;}
.btn-copy:hover{background:var(--bg4);color:var(--text);}

.m-foot{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end;}
.btn-mark{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;background:var(--accent);color:#000;transition:all .15s;}
.btn-mark:hover{background:#00ffaa;}
.btn-cancel{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;padding:8px 18px;border-radius:8px;border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;}
.btn-cancel:hover{background:var(--bg4);}

.toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--accent);color:var(--accent);padding:9px 16px;border-radius:9px;font-size:12px;font-weight:600;z-index:200;transform:translateY(50px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:600px){
  h1{font-size:19px;} .m-body{padding:14px 14px;} .overlay{padding:1rem .5rem;}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-row">
      <div class="logo-box">C++</div>
      <h1>Neso <span>C++</span> Tracker</h1>
    </div>
    <p class="subtitle">Watch lecture → open exercises → write real code → run it → mark done 🚀</p>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">Completed</div></div>
      <div class="stat"><div class="stat-n" id="s-left">50</div><div class="stat-l">Remaining</div></div>
      <div class="stat"><div class="stat-n" id="s-pct">0%</div><div class="stat-l">Progress</div></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-meta"><span>Overall progress</span><span id="prog-txt">0 / 50 lectures</span></div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
  </header>
  <div id="cont"></div>
</div>

<div class="overlay" id="overlay" onclick="closeOuter(event)">
  <div class="modal">
    <div class="m-head">
      <div><div class="m-topic" id="m-topic"></div><div class="m-title" id="m-title"></div></div>
      <button class="m-close" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body" id="m-body"></div>
    <div class="m-foot">
      <button class="btn-cancel" onclick="closeModal()">Close</button>
      <button class="btn-mark" onclick="markFromModal()">✓ Mark lecture done</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const curriculum = [
  {
    title:"Introduction", icon:"🚀", color:"#7c3aed",
    lectures:["Introduction to C++ programming","Writing a simple C++ program","Installing source code editor and compiler","Compiling & executing C++ programs (Windows CMD)","Compiling & executing C++ programs (VS Code)"],
    exercises:[
      {
        num:1, diff:"easy",
        problem:"Write a program that prints exactly 3 lines:\nLine 1: Your name\nLine 2: Your city\nLine 3: The message 'I am learning C++'",
        example:"Output:\nSai Teja\nPune\nI am learning C++",
        hint:"Use <b>cout</b> three times. Each cout ends with <b>&lt;&lt; endl;</b> or <b>&lt;&lt; \"\\n\";</b>",
        code:`#include <iostream>\nusing namespace std;\n\nint main() {\n    // TODO: Print your name\n    cout << "___" << endl;\n\n    // TODO: Print your city\n    cout << "___" << endl;\n\n    // TODO: Print the message\n    cout << "___" << endl;\n\n    return 0;\n}`
      },
      {
        num:2, diff:"easy",
        problem:"Write a program that asks the user to enter two numbers, then prints their SUM and PRODUCT.",
        example:"Input: 4  5\nOutput:\nSum = 9\nProduct = 20",
        hint:"Use <b>cin >> a >> b;</b> to read both numbers. Sum = a+b, Product = a*b.",
        code:`#include <iostream>\nusing namespace std;\n\nint main() {\n    int a, b;\n    cout << "Enter two numbers: ";\n    cin >> a >> b;\n\n    // TODO: Print sum\n    cout << "Sum = " << ___ << endl;\n\n    // TODO: Print product\n    cout << "Product = " << ___ << endl;\n\n    return 0;\n}`
      },
      {
        num:3, diff:"easy",
        problem:"Write a program that asks the user for their age, then prints: 'In 10 years, you will be X years old.' where X = age + 10.",
        example:"Input: 18\nOutput: In 10 years, you will be 28 years old.",
        hint:"Read age into an int. Then print age + 10 inside the cout statement.",
        code:`#include <iostream>\nusing namespace std;\n\nint main() {\n    int age;\n    cout << "Enter your age: ";\n    cin >> ___;\n\n    // TODO: Print the message\n    cout << "In 10 years, you will be " << ___ << " years old." << endl;\n\n    return 0;\n}`
      },
      {
        num:4, diff:"medium",
        problem:"Write a program that reads a temperature in Celsius and converts it to Fahrenheit.\nFormula: F = (C × 9/5) + 32",
        example:"Input: 100\nOutput: 100°C = 212°F",
        hint:"Use <b>float</b> for the temperature. Careful: 9/5 in int division = 1! Write <b>9.0/5</b> instead.",
        code:`#include <iostream>\nusing namespace std;\n\nint main() {\n    float celsius, fahrenheit;\n    cout << "Enter temperature in Celsius: ";\n    cin >> celsius;\n\n    // TODO: Apply the formula F = (C * 9.0/5) + 32\n    fahrenheit = ___;\n\n    cout << celsius << "C = " << fahrenheit << "F" << endl;\n    return 0;\n}`
      },
      {
        num:5, diff:"medium",
        problem:"Write a program that reads the radius of a circle and prints its AREA and CIRCUMFERENCE.\nArea = π × r²    Circumference = 2 × π × r\nUse π = 3.14159",
        example:"Input: 7\nOutput:\nArea = 153.938\nCircumference = 43.9823",
        hint:"Declare <b>const float PI = 3.14159;</b>. Area = PI * r * r. Circumference = 2 * PI * r.",
        code:`#include <iostream>\nusing namespace std;\n\nint main() {\n    const float PI = 3.14159;\n    float r;\n    cout << "Enter radius: ";\n    cin >> r;\n\n    float area = ___;\n    float circ = ___;\n\n    cout << "Area = " << area << endl;\n    cout << "Circumference = " << circ << endl;\n    return 0;\n}`
      },
      {
        num:6, diff:"medium",
        problem:"Simple bill calculator: Read item name, price per unit, and quantity. Print a formatted receipt showing the total.",
        example:"Input: Apple  20  5\nOutput:\nItem: Apple\nPrice: 20\nQty: 5\nTotal: 100",
        hint:"Use <b>string</b> for the item name. Total = price * quantity.",
        code:`#include <iostream>\n#include <string>\nusing namespace std;\n\nint main() {\n    string item;\n    float price;\n    int qty;\n\n    cout << "Item name: ";  cin >> item;\n    cout << "Price: ";      cin >> price;\n    cout << "Quantity: ";   cin >> qty;\n\n    float total = ___;\n\n    cout << "\\n--- Receipt ---" << endl;\n    cout << "Item: " << item << endl;\n    cout << "Price: " << price << endl;\n    cout << "Qty: " << qty << endl;\n    cout << "Total: " << ___ << endl;\n    return 0;\n}`
      },
      {
        num:7, diff:"hard",
        problem:"Write a program to swap two numbers WITHOUT using a third (temp) variable.\nHint: Use math — add and subtract!",
        example:"Input: a=5 b=9\nOutput:\nBefore: a=5 b=9\nAfter:  a=9 b=5",
        hint:"The trick: <b>a = a + b;</b> then <b>b = a - b;</b> then <b>a = a - b;</b>. Try to understand why it works!",
        code:`#include <iostream>\nusing namespace std;\n\nint main() {\n    int a = 5, b = 9;\n    cout << "Before: a=" << a << " b=" << b << endl;\n\n    // TODO: Swap without a temp variable\n    a = ___;\n    b = ___;\n    a = ___;\n\n    cout << "After:  a=" << a << " b=" << b << endl;\n    return 0;\n}`
      },
      {
        num:8, diff:"hard",
        problem:"Write a program that reads 3 numbers and prints the AVERAGE, and also says whether the average is above or below 50.",
        example:"Input: 40 60 70\nOutput:\nAverage = 56.67\nAbove average passing mark!",
        hint:"Average = (a + b + c) / 3.0 — use 3.0 not 3 to get a decimal result. Then use if/else.",
        code:`#include <iostream>\nusing namespace std;\n\nint main() {\n    float a, b, c;\n    cout << "Enter 3 numbers: ";\n    cin >> a >> b >> c;\n\n    float avg = ___;\n    cout << "Average = " << avg << endl;\n\n    if (___ > 50) {\n        cout << "Above average passing mark!" << endl;\n    } else {\n        cout << "Below passing mark. Keep practising!" << endl;\n    }\n    return 0;\n}`
      }
    ]
  },
  {
    title:"Input, Output & Basics", icon:"💻", color:"#0ea5e9",
    lectures:["Input and output in C++","Namespaces in C++","Comments in C++","Comments in C++ (exercise)"],
    exercises:[
      {
        num:1, diff:"easy",
        problem:"Write a program that asks for the user's first name and last name separately, then prints: 'Hello, FirstName LastName! Nice to meet you.'",
        example:"Input: Sai Teja\nOutput: Hello, Sai Teja! Nice to meet you.",
        hint:"Use two <b>string</b> variables. Read with <b>cin >> first >> last;</b>",
        code:`#include <iostream>\n#include <string>\nusing namespace std;\n\nint main() {\n    string first, last;\n    cout << "First name: ";  cin >> first;\n    cout << "Last name: ";   cin >> last;\n\n    // TODO: Print the greeting\n    cout << "Hello, " << ___ << " " << ___ << "! Nice to meet you." << endl;\n    return 0;\n}`
      },
      {
        num:2, diff:"easy",
        problem:"Write a program that reads a full sentence from the user (with spaces) using getline, then prints how many characters are in the sentence.",
        example:"Input: I love coding\nOutput: Your sentence has 13 characters.",
        hint:"Use <b>getline(cin, sentence)</b> to read a full line with spaces. Use <b>sentence.length()</b> for the count.",
        code:`#include <iostream>\n#include <string>\nusing namespace std;\n\nint main() {\n    string sentence;\n    cout << "Enter a sentence: ";\n    getline(cin, ___);\n\n    cout << "Your sentence has " << ___.length() << " characters." << endl;\n    return 0;\n}`
      },
      {
        num:3, diff:"easy",
        problem:"Without using 'using namespace std;', rewrite a program that prints 'Hello World' — you'll need to add std:: before cout and endl.",
        example:"Output: Hello World",
        hint:"Replace <b>cout</b> with <b>std::cout</b> and <b>endl</b> with <b>std::endl</b>. This is why namespaces exist!",
        code:`#include <iostream>\n// Note: NO 'using namespace std;' this time!\n\nint main() {\n    // TODO: Print Hello World using std::cout\n    ___::cout << "Hello World" << ___::endl;\n    return 0;\n}`
      },
      {
        num:4, diff:"medium",
        problem:"Write a well-commented program that calculates simple interest.\nFormula: SI = (Principal × Rate × Time) / 100\nAdd a comment explaining each line.",
        example:"Input: P=1000 R=5 T=2\nOutput: Simple Interest = 100",
        hint:"Use // for single-line comments explaining each step. Good comments = good programmer habit!",
        code:`#include <iostream>\nusing namespace std;\n\nint main() {\n    // Variables to store principal, rate and time\n    float p, r, t;\n\n    // TODO: Read input from user\n    cout << "Principal: ";  cin >> p;\n    cout << "Rate (%): ";   cin >> r;\n    cout << "Time (yrs): "; cin >> t;\n\n    // TODO: Calculate simple interest using the formula\n    float si = ___;\n\n    // TODO: Print result\n    cout << "Simple Interest = " << ___ << endl;\n    return 0;\n}`
      },
      {
        num:5, diff:"medium",
        problem:"Write a program that reads a distance in kilometres and converts it to:\n- Miles (1 km = 0.621371 miles)\n- Metres (1 km = 1000 m)\n- Centimetres",
        example:"Input: 5\nOutput:\n5 km = 3.107 miles\n5 km = 5000 metres\n5 km = 500000 cm",
        hint:"Declare the conversion factor as a <b>const float</b>. Multiply for each unit.",
        code:`#include <iostream>\nusing namespace std;\n\nint main() {\n    float km;\n    cout << "Enter distance in km: ";\n    cin >> km;\n\n    const float KM_TO_MILES = 0.621371;\n\n    cout << km << " km = " << ___ << " miles" << endl;\n    cout << km << " km = " << ___ << " metres" << endl;\n    cout << km << " km = " << ___ << " cm" << endl;\n    return 0;\n}`
      },
      {
        num:6, diff:"medium",
        problem:"Write a program that reads a person's weight in KG and height in metres, then calculates their BMI.\nFormula: BMI = weight / (height × height)",
        example:"Input: weight=70 height=1.75\nOutput: BMI = 22.86",
        hint:"Use <b>float</b> for both variables. BMI = weight / (height * height).",
        code:`#include <iostream>\nusing namespace std;\n\nint main() {\n    float weight, height;\n    cout << "Weight (kg): ";  cin >> weight;\n    cout << "Height (m): ";   cin >> height;\n\n    float bmi = ___;\n    cout << "Your BMI = " << bmi << endl;\n    return 0;\n}`
      },
      {
        num:7, diff:"hard",
        problem:"Write a program that reads a 3-digit number from the user and prints:\n1. Its individual digits (hundreds, tens, ones)\n2. The sum of its digits\n3. The reverse of the number",

// ── helpers ──
let progress = {};
let curModal = null;

function load(){ try{ const d=localStorage.getItem('neso_v3'); if(d) progress=JSON.parse(d); }catch(e){} }
function save(){ try{ localStorage.setItem('neso_v3',JSON.stringify(progress)); }catch(e){} }
function lid(si,li){ return si+'_'+li; }
function totalDone(){ return Object.values(progress).filter(Boolean).length; }
function totalAll(){ return curriculum.reduce((a,s)=>a+s.lectures.length,0); }

function updateStats(){
  const done=totalDone(), total=totalAll();
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-left').textContent=total-done;
  document.getElementById('s-pct').textContent=Math.round(done/total*100)+'%';
  document.getElementById('prog-fill').style.width=(done/total*100)+'%';
  document.getElementById('prog-txt').textContent=done+' / '+total+' lectures';
}

function buildUI(){
  const cont=document.getElementById('cont');
  let gIdx=1;
  curriculum.forEach((sec,si)=>{
    const el=document.createElement('div');
    el.className='section';
    el.id='sec'+si;
    const doneSec=sec.lectures.filter((_,li)=>progress[lid(si,li)]).length;
    const allDone=doneSec===sec.lectures.length;
    el.innerHTML=`
      <div class="sec-hdr" onclick="toggleSec(${si})">
        <div class="sec-ico" style="background:${sec.color}18">${sec.icon}</div>
        <div class="sec-ttl">${sec.title}</div>
        <div class="sec-badge ${allDone?'done':''}" id="badge${si}">${doneSec}/${sec.lectures.length}</div>
        <div class="chev" id="chev${si}">▼</div>
      </div>
      <div class="sec-body" id="body${si}">
        ${sec.lectures.map((lec,li)=>{
          const d=progress[lid(si,li)];
          return `<div class="lec-row ${d?'done-row':''}" id="row${si}_${li}">
            <span class="lec-n">${String(gIdx++).padStart(2,'0')}</span>
            <span class="lec-name">${lec}</span>
            <button class="btn-prac" onclick="openModal(${si},${li})">exercises ↗</button>
            <div class="lec-chk ${d?'on':''}" id="chk${si}_${li}" onclick="toggleLec(${si},${li})">${d?'✓':''}</div>
          </div>`;
        }).join('')}
      </div>`;
    cont.appendChild(el);
  });
  updateStats();
}

function toggleSec(si){
  const s=document.getElementById('sec'+si);
  s.classList.toggle('open');
}

function toggleLec(si,li){
  const id=lid(si,li);
  progress[id]=!progress[id];
  save();
  const chk=document.getElementById('chk'+si+'_'+li);
  const row=document.getElementById('row'+si+'_'+li);
  if(progress[id]){chk.classList.add('on');chk.textContent='✓';row.classList.add('done-row');toast('Done! Keep going 🔥');}
  else{chk.classList.remove('on');chk.textContent='';row.classList.remove('done-row');}
  const sec=curriculum[si];
  const doneSec=sec.lectures.filter((_,li2)=>progress[lid(si,li2)]).length;
  const badge=document.getElementById('badge'+si);
  badge.textContent=doneSec+'/'+sec.lectures.length;
  badge.className='sec-badge'+(doneSec===sec.lectures.length?' done':'');
  updateStats();
}

function diffLabel(d){ return d==='easy'?'diff-easy':d==='hard'?'diff-hard':'diff-med'; }

function openModal(si,li){
  curModal={si,li};
  const sec=curriculum[si];
  document.getElementById('m-topic').textContent=sec.title;
  document.getElementById('m-title').textContent=sec.lectures[li];

  const body=document.getElementById('m-body');
  body.innerHTML=sec.exercises.map((ex,i)=>{
    const encoded=encodeURIComponent(ex.code);
    const onlineUrl='https://www.onlinegdb.com/online_c++_compiler';
    return `<div class="q-card">
      <div class="q-top">
        <div class="q-meta">
          <div class="q-num">Exercise ${ex.num}</div>
          <div class="q-diff ${diffLabel(ex.diff)}">${ex.diff}</div>
        </div>
        <div class="q-problem">${ex.problem.replace(/\n/g,'<br>')}</div>
        <div class="q-example">${ex.example.replace(/\n/g,'<br>')}</div>
        <button class="q-hint-toggle" onclick="toggleHint(${i})">💡 Show hint</button>
        <div class="q-hint" id="hint${si}_${li}_${i}">${ex.hint}</div>
      </div>
      <div class="q-code-wrap">
        <div class="q-code-label">starter code — fill in the ___</div>
        <div class="q-code" id="code${si}_${li}_${i}">${syntaxHL(ex.code)}</div>
        <div class="q-actions">
          <a class="btn-run" href="${onlineUrl}" target="_blank" rel="noopener">▶ Run on OnlineGDB</a>
          <button class="btn-copy" onclick="copyCode(${si},${li},${i})">Copy code</button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
}

function toggleHint(i){
  const el=document.getElementById('hint'+curModal.si+'_'+curModal.li+'_'+i);
  el.classList.toggle('show');
  const btn=el.previousElementSibling;
  btn.textContent=el.classList.contains('show')?'🙈 Hide hint':'💡 Show hint';
}

function copyCode(si,li,i){
  const el=document.getElementById('code'+si+'_'+li+'_'+i);
  const text=el.textContent;
  navigator.clipboard.writeText(text).then(()=>toast('Code copied! ✓')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Code copied! ✓');
  });
}

function syntaxHL(code){
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/.*)/g,'<span class="cmt">$1</span>')
    .replace(/\b(int|float|double|char|bool|void|string|auto|const|return|if|else|for|while|do|class|public|private|protected|new|delete|true|false|this|static|virtual|override|friend|namespace|using|include|endl|cout|cin)\b/g,'<span class="kw">$1</span>')
    .replace(/"([^"]*)"/g,'<span class="str">"$1"</span>')
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="num">$1</span>');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow='';
  curModal=null;
}
function closeOuter(e){ if(e.target===document.getElementById('overlay')) closeModal(); }
function markFromModal(){ if(!curModal) return; if(!progress[lid(curModal.si,curModal.li)]) toggleLec(curModal.si,curModal.li); closeModal(); }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

load(); buildUI();
</script>
